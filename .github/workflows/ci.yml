name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege by default; each job opts back in to only what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Run actionlint
        # Pinned release + checksum so a tampered binary can't slip in.
        env:
          ACTIONLINT_VERSION: 1.7.7
          ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
        run: |
          set -euo pipefail
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        # Static analysis of the workflows themselves: template injection,
        # unpinned actions, credential persistence, over-broad permissions.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pipx run zizmor==1.25.2 .github/workflows

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile
          # DL3018: pinning apk versions is impractical on Alpine; base images
          # are pinned by tag and old apk versions get purged from the repo.
          # DL3019: the apk block mixes `apk update`/cache-clean with --no-cache;
          # an info-level style nit, not worth reworking the prod image build here.
          ignore: DL3018,DL3019

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Scan for secrets
        # The repo ships compose examples and a bundled Portainer updater that
        # reads PORTAINER_API_* env; this guards against committing a real one.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Run shellcheck
        # First-party scripts that ship in the image. Print every finding for
        # visibility, but only fail on error severity so pre-existing
        # info/warning items don't block.
        run: |
          shellcheck scripts/portainer_stack_update.sh Docker.entrypoint.sh || true
          echo "--- gating on error severity ---"
          shellcheck --severity=error scripts/portainer_stack_update.sh Docker.entrypoint.sh

  app-test:
    name: app tests (jest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Supply-chain guard: block all runner egress except the endpoints this
      # job needs (checkout, setup-node, npm, actions cache). A compromised
      # dependency install script can no longer phone home. Allowlist derived
      # from harden-runner audit telemetry; the *.blob.core.windows.net entry
      # covers the rotating Actions-cache hostnames.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node 18
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install deps
        working-directory: app
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run jest
        working-directory: app
        run: npm test

  ui-build:
    name: ui build (vite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install deps
        working-directory: ui
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Build
        working-directory: ui
        run: npm run build

  docker-build:
    name: Build image and scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload Trivy SARIF to code scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          # Adds the image-build endpoints on top of the install set: Docker Hub
          # (base images), ghcr + pkg-containers (Trivy DB), Alpine apk mirror,
          # Trivy version check.
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            registry.npmjs.org:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudfront.docker.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            check.trivy.dev:443
            dl-cdn.alpinelinux.org:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      # Build (no push) so a broken Dockerfile fails on the PR, not at release.
      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: hosaka:ci
          build-args: |
            HOSAKA_VERSION=ci
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: hosaka:ci
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
        env:
          # Pin DB sources to avoid rate-limited Docker Hub mirrors.
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  npm-audit:
    name: npm audit (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: [app, ui, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Audit ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        # Advisory only: surfaces high+ advisories without blocking the merge.
        run: npm audit --audit-level=high || true
